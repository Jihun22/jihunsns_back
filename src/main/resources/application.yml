spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL}               # DB 접속 URL (환경변수 사용)
    username: ${SPRING_DATASOURCE_USERNAME}     # DB 접속 사용자명
    password: ${SPRING_DATASOURCE_PASSWORD}     # DB 접속 비밀번호

  jpa:
    hibernate:
      ddl-auto: update                          # 엔티티 변경 시 테이블 스키마 자동 업데이트
      # (none / validate / update / create / create-drop)
    show-sql: true                              # 실행되는 SQL 콘솔에 출력
    open-in-view: false                         # 권장: false (Service 계층까지만 DB 세션 열기 → N+1 문제 예방)
    properties:
      hibernate:
        format_sql: true                        # SQL 보기 좋게 포맷팅
        dialect: org.hibernate.dialect.PostgreSQLDialect  # PostgreSQL 전용 Hibernate 방언
        jdbc:
          batch_size: 50                        # INSERT/UPDATE 시 한 번에 묶어서 실행할 row 수
          order_inserts: true                   # INSERT 순서를 최적화하여 배치 효율 증가
          order_updates: true                   # UPDATE 순서를 최적화하여 배치 효율 증가
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${APP_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID}}
            client-secret: ${APP_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET}}
            scope:
              - profile
              - email

          naver:
            client-id: ${APP_NAVER_CLIENT_ID:${NAVER_CLIENT_ID}}
            client-secret: ${APP_NAVER_CLIENT_SECRET:${NAVER_CLIENT_SECRET}}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image

          kakao:
            client-id: ${APP_KAKAO_CLIENT_ID:${KAKAO_CLIENT_ID}}
            client-secret: ${APP_KAKAO_CLIENT_SECRET:${KAKAO_CLIENT_SECRET}}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
logging:
  level:
    org.hibernate.SQL: debug                    # 실행된 SQL 쿼리 출력
    org.hibernate.type.descriptor.sql: trace    # SQL에 바인딩된 실제 파라미터 값까지 출력


# ✅ JWT 설정 (JwtProvider에서 읽음)
app:
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${APP_JWT_SECRET:base64:c29tZS1sb25nZXItbG9jYWwtZGV2LXNlY3JldC1vZi0tYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==}
    issuer: jihunsns
    access-exp-min: 60         # 액세스 토큰 만료(분)
    refresh-exp-day: 14        # 리프레시 토큰 만료(일)
  oauth2:
    # OAuth2 로그인 후 프론트엔드가 받는 리다이렉트 URI (환경변수로 덮어쓰기 가능)
    authorized-redirect-uri: ${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:3000/oauth/callback}
